<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Link Bypasser</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- MDUI for components -->
    <link rel="stylesheet" href="https://unpkg.com/mdui@2/mdui.css">
    <script src="https://unpkg.com/mdui@2/mdui.global.js"></script>
    <!-- hCaptcha script -->
    <script src="https://hcaptcha.com/1/api.js" async defer></script>
    
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .hidden {
            display: none !important;
        }
        .show {
            opacity: 1;
            transition: opacity 0.3s ease-in;
        }
        #result {
            opacity: 0;
            transition: opacity 0.3s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Nav element required by the script -->
    <nav class="w-full fixed top-0 p-4 transition-all duration-300 z-50">
        <h1 class="text-xl font-bold text-center">Link Bypasser</h1>
    </nav>

    <div class="w-full max-w-md bg-gray-800 p-8 rounded-2xl shadow-xl mt-16 border border-gray-700">
        
        <form id="bypass-form" class="space-y-4">
            <div>
                <label for="bypass-url" class="block text-sm font-medium text-gray-300 mb-1">Enter URL to Bypass</label>
                <input type="url" id="bypass-url" required placeholder="https://example.com/link" 
                       class="w-full px-4 py-3 bg-gray-900 border border-gray-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-gray-500">
            </div>

            <!-- hCaptcha Container -->
            <div id="hcaptcha-container" class="flex justify-center my-4"></div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition duration-200">
                Bypass Link
            </button>
        </form>

        <!-- Progress Bar -->
        <div id="progress-bar" class="hidden mt-6">
            <div class="flex justify-center items-center space-x-2">
                <mdui-circular-progress></mdui-circular-progress>
                <span class="text-gray-300 text-sm">Processing...</span>
            </div>
        </div>

        <!-- Error Container -->
        <div id="errorContainer"></div>

        <!-- Result Container -->
        <div id="result" class="hidden mt-6 border-t border-gray-700 pt-6">
            <div id="result-content" class="w-full"></div>
        </div>

    </div>

    <!-- The unobfuscated JS script -->
    <script src="unobfuscated_dois.js"></script>
</body>
</html>
